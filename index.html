<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>HIMEL TRADE — Market Dashboard</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Space+Mono:ital,wght@0,400;0,700;1,400&family=Bebas+Neue&family=DM+Sans:wght@300;400;500&display=swap');
  :root {
    --bg:#080808;--bg2:#0f0f0f;--bg3:#151515;--border:#1f1f1f;
    --green:#00ff88;--red:#ff3b5c;--blue:#00cfff;--yellow:#ffd93d;
    --text:#e8e8e8;--muted:#555;--mid:#888;
  }
  *{margin:0;padding:0;box-sizing:border-box;}
  body{background:var(--bg);color:var(--text);font-family:'DM Sans',sans-serif;font-size:13px;overflow-x:hidden;}
  header{display:flex;align-items:center;justify-content:space-between;padding:12px 20px;border-bottom:1px solid var(--border);background:var(--bg);position:sticky;top:0;z-index:100;}
  .logo{font-family:'Bebas Neue',sans-serif;font-size:22px;letter-spacing:3px;color:var(--green);}
  .logo span{color:var(--muted);font-size:13px;letter-spacing:1px;margin-left:10px;font-family:'Space Mono',monospace;}
  .header-right{display:flex;align-items:center;gap:16px;}
  #market-time{font-family:'Space Mono',monospace;font-size:12px;color:var(--mid);}
  .market-status{font-family:'Space Mono',monospace;font-size:10px;padding:3px 8px;border-radius:2px;letter-spacing:1px;}
  .status-open{background:rgba(0,255,136,0.1);color:var(--green);border:1px solid rgba(0,255,136,0.3);}
  .status-closed{background:rgba(255,59,92,0.1);color:var(--red);border:1px solid rgba(255,59,92,0.3);}
  .status-pre{background:rgba(255,217,61,0.1);color:var(--yellow);border:1px solid rgba(255,217,61,0.3);}
  #refresh-btn{background:none;border:1px solid var(--border);color:var(--mid);padding:5px 12px;cursor:pointer;font-family:'Space Mono',monospace;font-size:10px;letter-spacing:1px;transition:all 0.2s;}
  #refresh-btn:hover{border-color:var(--green);color:var(--green);}
  #refresh-btn.loading{color:var(--yellow);border-color:var(--yellow);}
  .main{display:grid;grid-template-columns:280px 1fr 300px;grid-template-rows:1fr auto;gap:1px;background:var(--border);height:calc(100vh - 49px);}
  .panel{background:var(--bg);overflow-y:auto;overflow-x:hidden;}
  .ticker-panel{grid-row:1/3;}
  .panel-header{padding:12px 14px;border-bottom:1px solid var(--border);font-family:'Space Mono',monospace;font-size:10px;letter-spacing:2px;color:var(--muted);display:flex;justify-content:space-between;align-items:center;position:sticky;top:0;background:var(--bg);z-index:10;}
  .panel-header .count{background:var(--bg3);padding:2px 6px;color:var(--mid);font-size:9px;}
  .ticker-sections{padding:8px 0;}
  .section-label{padding:6px 14px 4px;font-family:'Space Mono',monospace;font-size:9px;letter-spacing:2px;color:var(--muted);}
  .ticker-item{padding:9px 14px;cursor:pointer;border-left:2px solid transparent;transition:all 0.15s;display:flex;justify-content:space-between;align-items:center;}
  .ticker-item:hover{background:var(--bg3);}
  .ticker-item.active{border-left-color:var(--green);background:rgba(0,255,136,0.04);}
  .ticker-left{display:flex;flex-direction:column;gap:2px;}
  .ticker-sym{font-family:'Space Mono',monospace;font-size:12px;font-weight:700;color:var(--text);}
  .ticker-name{font-size:10px;color:var(--muted);}
  .ticker-right{display:flex;flex-direction:column;align-items:flex-end;gap:2px;}
  .ticker-price{font-family:'Space Mono',monospace;font-size:12px;}
  .ticker-change{font-family:'Space Mono',monospace;font-size:10px;}
  .up{color:var(--green);} .down{color:var(--red);} .neutral{color:var(--mid);}
  .signal-badge{font-size:8px;padding:1px 5px;border-radius:1px;font-family:'Space Mono',monospace;letter-spacing:1px;margin-top:2px;}
  .sig-bull{background:rgba(0,255,136,0.12);color:var(--green);}
  .sig-bear{background:rgba(255,59,92,0.12);color:var(--red);}
  .sig-neutral{background:rgba(136,136,136,0.1);color:var(--mid);}
  .chart-area{grid-column:2;grid-row:1;display:flex;flex-direction:column;}
  .chart-header{padding:12px 16px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:8px;}
  .chart-title{display:flex;align-items:baseline;gap:10px;}
  .chart-sym{font-family:'Bebas Neue',sans-serif;font-size:28px;letter-spacing:2px;color:var(--text);}
  .chart-price-display{font-family:'Space Mono',monospace;font-size:18px;}
  .chart-change-display{font-family:'Space Mono',monospace;font-size:12px;}
  .tf-buttons{display:flex;gap:4px;}
  .tf-btn{background:none;border:1px solid var(--border);color:var(--muted);padding:4px 10px;cursor:pointer;font-family:'Space Mono',monospace;font-size:10px;transition:all 0.15s;}
  .tf-btn:hover{border-color:var(--mid);color:var(--mid);}
  .tf-btn.active{border-color:var(--green);color:var(--green);background:rgba(0,255,136,0.06);}
  .chart-container{flex:1;padding:12px 16px;position:relative;min-height:0;}
  canvas{width:100%!important;}
  .indicators-row{grid-column:2;grid-row:2;display:grid;grid-template-columns:1fr 1fr 1fr;gap:1px;background:var(--border);max-height:160px;}
  .indicator-panel{background:var(--bg2);padding:10px 14px;overflow:hidden;}
  .ind-label{font-family:'Space Mono',monospace;font-size:9px;letter-spacing:2px;color:var(--muted);margin-bottom:6px;display:flex;justify-content:space-between;}
  .ind-value{font-family:'Space Mono',monospace;font-size:20px;font-weight:700;margin-bottom:4px;}
  .ind-signal{font-size:10px;color:var(--mid);margin-bottom:8px;}
  .ind-bar-bg{height:3px;background:var(--border);border-radius:2px;overflow:hidden;}
  .ind-bar-fill{height:100%;border-radius:2px;transition:width 0.5s ease;}
  .signal-panel{grid-row:1/3;}
  .signal-feed{padding:0;}
  .signal-item{padding:10px 14px;border-bottom:1px solid var(--border);animation:fadeIn 0.3s ease;}
  @keyframes fadeIn{from{opacity:0;transform:translateX(8px);}to{opacity:1;transform:translateX(0);}}
  .signal-top{display:flex;justify-content:space-between;align-items:center;margin-bottom:4px;}
  .signal-ticker{font-family:'Space Mono',monospace;font-size:11px;font-weight:700;}
  .signal-time{font-family:'Space Mono',monospace;font-size:9px;color:var(--muted);}
  .signal-type{font-size:10px;font-weight:500;margin-bottom:3px;}
  .signal-desc{font-size:10px;color:var(--mid);line-height:1.4;}
  .signal-strength{display:flex;gap:3px;margin-top:5px;}
  .strength-dot{width:6px;height:6px;border-radius:50%;background:var(--border);}
  .strength-dot.filled-bull{background:var(--green);}
  .strength-dot.filled-bear{background:var(--red);}
  .stats-bar{padding:10px 14px;border-bottom:1px solid var(--border);display:grid;grid-template-columns:1fr 1fr;gap:8px;}
  .stat-item{display:flex;flex-direction:column;gap:2px;}
  .stat-label{font-family:'Space Mono',monospace;font-size:9px;color:var(--muted);letter-spacing:1px;}
  .stat-value{font-family:'Space Mono',monospace;font-size:12px;}
  ::-webkit-scrollbar{width:3px;}
  ::-webkit-scrollbar-track{background:transparent;}
  ::-webkit-scrollbar-thumb{background:var(--border);}
  .divider{height:1px;background:var(--border);margin:4px 0;}
  .err{font-family:'Space Mono',monospace;font-size:9px;color:var(--red);padding:4px 14px;}
</style>
</head>

</div>

async function ttGetToken() {
  if(TT.accessToken && Date.now() < TT.tokenExpiry - 60000) return TT.accessToken;
  try {
    const r = await fetch(`${TT.base}/oauth/token`, {
      method: 'POST',
      headers: {'Content-Type':'application/x-www-form-urlencoded'},
      body: new URLSearchParams({
        grant_type:    'refresh_token',
        refresh_token: TT.refreshToken,
        client_id:     TT.clientId,

    });
    const d = await r.json();

  } catch(e) { console.error('TT auth error:', e); return null; }
}

async function ttGet(path) {
  const token = await ttGetToken();
  if(!token) return null;
  try {
    const r = await fetch(`${TT.base}${path}`, {
      headers: {'Authorization': 'Bearer ' + token, 'Content-Type':'application/json'}
    });
    if(!r.ok) { console.error(`TT ${path} → ${r.status}`); return null; }
    return await r.json();
  } catch(e) { console.error('TT fetch error:', path, e); return null; }
}

const TICKERS = {
  indexes: [
    {sym:'SPY',name:'S&P 500 ETF'},
    {sym:'QQQ',name:'Nasdaq ETF'},
    {sym:'IWM',name:'Russell 2000'},

  ],
  active_options: [
    {sym:'NVDA',name:'Nvidia'},
    {sym:'TSLA',name:'Tesla'},
    {sym:'AAPL',name:'Apple'},
    {sym:'AMZN',name:'Amazon'},
    {sym:'META',name:'Meta'},
    {sym:'MSFT',name:'Microsoft'},

    {sym:'MSTR',name:'MicroStrategy'},
  ]
};

const ALL_TICKERS = [...TICKERS.indexes, ...TICKERS.active_options];
let quoteData = {};
let chartInstance = null;
let activeTicker = 'SPY';
let activeTF = 'D';
let activeFrom = '1y';
let signals = [];

// ── CLOCK ──────────────────────────────────────────────────────────────────
function updateClock() {
  const now = new Date();
  const est = new Date(now.toLocaleString('en-US',{timeZone:'America/New_York'}));
  const h=est.getHours(),m=est.getMinutes(),s=est.getSeconds();
  const p=n=>String(n).padStart(2,'0');
  document.getElementById('market-time').textContent=`${p(h)}:${p(m)}:${p(s)} EST`;
  const statusEl=document.getElementById('market-status');
  const day=est.getDay(),t=h*100+m,wd=day>=1&&day<=5;
  if(!wd||t>=1600||t<400){statusEl.textContent='CLOSED';statusEl.className='market-status status-closed';}
  else if(t<930){statusEl.textContent='PRE-MKT';statusEl.className='market-status status-pre';}
  else{statusEl.textContent='LIVE';statusEl.className='market-status status-open';}
}
setInterval(updateClock,1000);
updateClock();

// ── TASTYTRADE DXLINK MARKET DATA ────────────────────────────────────────────
// Tastytrade uses DXLink WebSocket for market data, not REST
// Flow: get token → connect WebSocket → subscribe → receive quotes/candles

let dxSocket = null;
let dxToken = null;
let dxChannel = 1;
const dxCallbacks = {}; // sym -> {quote, candle}
const dxQuoteData = {}; // live quote store from stream
const dxCandleData = {}; // live candle store from stream

async function getDXToken() {
  if(dxToken) return dxToken;
  const d = await ttGet('/api-quote-tokens');
  dxToken = d?.data?.token || d?.data?.['dxlink-url'] ? d.data : null;
  console.log('DX token response:', d?.data);
  return d?.data;
}

async function connectDXLink(syms) {
  const tokenData = await getDXToken();
  if(!tokenData) { console.error('No DX token'); return; }
  
  const wsUrl = tokenData['websocket-url'] || tokenData['dxlink-url'] || 'wss://tasty-openapi-ws.dxfeed.com/realtime';
  const token = tokenData['token'];
  
  console.log('Connecting DXLink:', wsUrl);
  
  return new Promise((resolve, reject) => {
    dxSocket = new WebSocket(wsUrl);
    let step = 'setup'; // setup -> auth -> channel_q -> feed_setup_q -> channel_c -> feed_setup_c -> ready

    dxSocket.onopen = () => {
      console.log('DXLink connected, sending SETUP');
      dxSocket.send(JSON.stringify({
        type:'SETUP', channel:0,
        keepaliveTimeout:60, acceptKeepaliveTimeout:60,
        version:'0.1-js/1.0.0-beta.3'
      }));
    };

    dxSocket.onmessage = (e) => {
      const msg = JSON.parse(e.data);
      console.log('DXLink msg:', msg.type, msg.state||msg.channel||'');

      if(msg.type === 'SETUP') {
        // Send AUTH after setup ack
        dxSocket.send(JSON.stringify({type:'AUTH',channel:0,token}));
        return;
      }

      if(msg.type === 'AUTH_STATE') {
        if(msg.state === 'AUTHORIZED') {
          console.log('DXLink authorized — opening quote channel');
          dxSocket.send(JSON.stringify({type:'CHANNEL_REQUEST',channel:1,service:'FEED',parameters:{contract:'AUTO'}}));
        } else {
          console.error('DXLink auth failed:', msg);
          reject(msg);
        }
        return;
      }

      if(msg.type === 'CHANNEL_OPENED' && msg.channel === 1) {
        // Setup quote feed
        dxSocket.send(JSON.stringify({
          channel:1, type:'FEED_SETUP',
          acceptAggregationPeriod:1,
          acceptDataFormat:'COMPACT',
          acceptEventFields:{Quote:['eventSymbol','bidPrice','askPrice']}
        }));
        return;
      }

      if(msg.type === 'FEED_CONFIG' && msg.channel === 1) {
        // Subscribe quotes
        const quoteSubs = syms.map(s => ({type:'Quote',symbol:s}));
        dxSocket.send(JSON.stringify({channel:1,type:'FEED_SUBSCRIPTION',reset:true,add:quoteSubs}));
        // Open candle channel
        dxSocket.send(JSON.stringify({type:'CHANNEL_REQUEST',channel:3,service:'FEED',parameters:{contract:'AUTO'}}));
        return;
      }

      if(msg.type === 'CHANNEL_OPENED' && msg.channel === 3) {
        // Setup candle feed
        dxSocket.send(JSON.stringify({
          channel:3, type:'FEED_SETUP',
          acceptAggregationPeriod:1,
          acceptDataFormat:'COMPACT',
          acceptEventFields:{Candle:['eventType','eventSymbol','time','open','high','low','close']}
        }));
        return;
      }

      if(msg.type === 'FEED_CONFIG' && msg.channel === 3) {
        console.log('DXLink fully ready — subscribing candles');
        // Subscribe daily candles for all syms
        const from = Date.now() - 365*24*60*60*1000;
        const candleSubs = syms.map(s => ({type:'Candle',symbol:`${s}{=d}`,fromTime:from}));
        dxSocket.send(JSON.stringify({channel:3,type:'FEED_SUBSCRIPTION',reset:true,add:candleSubs}));
        resolve();
        return;
      }

      if(msg.type === 'FEED_DATA') {
        const tmp = msg.data;
        if(!tmp||!Array.isArray(tmp)) return;
        const dataType = tmp[0];
        const data = [...(tmp[1]||[])];

        if(dataType === 'Quote') {
          while(data.length >= 3) {
            const [sym, bid, ask] = data.splice(0,3);
            const price = (parseFloat(bid||0)+parseFloat(ask||0))/2;
            if(price && sym) {
              const prev = parseFloat(dxQuoteData[sym]?.prevClose) || price;
              const change = price - prev;
              const changePct = prev ? (change/prev)*100 : 0;
              dxQuoteData[sym] = {
                sym, price:price.toFixed(2),
                change:change.toFixed(2), changePct:changePct.toFixed(2),
                high:null, low:null, volume:null,
                prevClose:parseFloat(prev).toFixed(2), _signal:'neutral',
                bid:parseFloat(bid).toFixed(2), ask:parseFloat(ask).toFixed(2)
              };
              quoteData[sym] = {...(quoteData[sym]||{}), ...dxQuoteData[sym]};
              renderTickerList();
              // Update active ticker price live
              if(sym === activeTicker) {
                document.getElementById('active-price').textContent = `$${price.toFixed(2)}`;
              }
            }
          }
        }

        if(dataType === 'Candle') {
          while(data.length >= 7) {
            const [evType, symRaw, t, o, h, l, cl] = data.splice(0,7);
            if(o === 'NaN' || !symRaw) continue;
            const match = symRaw.match(/^([A-Z.]+)\{=([^}]+)\}/);
            const sym = match ? match[1] : symRaw;
            if(!dxCandleData[sym]) dxCandleData[sym] = [];
            dxCandleData[sym].push({
              t: new Date(parseInt(t)),
              o:parseFloat(o), h:parseFloat(h),
              l:parseFloat(l), c:parseFloat(cl), v:0
            });
          }
          // If active ticker candles just arrived, render
          if(dxCandleData[activeTicker]?.length > 5) {
            const candles = dxCandleData[activeTicker].filter(c=>c.c&&!isNaN(c.c)).sort((a,b)=>a.t-b.t);
            candleCache[activeTicker] = candles;
            renderChart(candles);
            updateIndicators(candles, quoteData[activeTicker]?.price);
          }
        }
      }

      if(msg.type === 'KEEPALIVE') {
        dxSocket.send(JSON.stringify({type:'KEEPALIVE',channel:0}));
      }
    };

    dxSocket.onerror = (e) => console.error('DXLink error:', e);
    dxSocket.onclose = () => { console.log('DXLink closed'); dxSocket=null; dxToken=null; };
  });
}

// Fetch quote via DXLink — returns from cache or waits for stream
async function fetchQuote(sym) {
  // Return cached if available
  if(dxQuoteData[sym]) return dxQuoteData[sym];
  // Fallback: use market metrics REST endpoint which IS available
  try {
    const d = await ttGet(`/market-metrics?symbols=${sym}`);
    const items = d?.data?.items;
    const q = items?.[0];
    if(!q) return null;
    const price = parseFloat(q['last-price'] || q['mark'] || 0);
    if(!price) return null;
    return {
      sym,
      price: price.toFixed(2),
      change: '0.00',
      changePct: '0.00',
      high: null, low: null, volume: null,
      prevClose: price.toFixed(2),
      _signal: 'neutral'
    };
  } catch(e) { return null; }
}

async function fetchCandles(sym, res, range) {
  try {
    // TT candle resolution mapping
    const resMap = {
      '1':'1m','5':'5m','15':'15m','60':'1h','D':'1d','W':'1w'
    };
    const ttRes = resMap[res] || '1d';
    const now = new Date();
    const rangeMs = {'1d':86400000,'5d':432000000,'1m':2592000000,'3m':7776000000,'1y':31536000000,'5y':157680000000};
    const ms = rangeMs[range] || 31536000000;
    const from = new Date(now - ms).toISOString();
    const to   = now.toISOString();
    const path = `/market-metrics/history?symbol=${sym}&start-date=${from.split('T')[0]}&end-date=${to.split('T')[0]}&period-frequency=${ttRes === '1d' ? 1 : 7}&period-type=${ttRes === '1d' ? 'day' : 'week'}`;
    console.log(`Fetching candles: ${sym} ${ttRes}`);
    const d = await ttGet(path);
    // TT history returns data.items[0].candles
    console.log(`Candle raw response for ${sym}:`, JSON.stringify(d).slice(0,300));
    const symData = d?.data?.items?.[0] || d?.data?.[0];
    const items = symData?.candles || d?.data?.items || d?.data || [];
    if(!items||items.length===0){ console.log(`No candles for ${sym}`, d); return null; }
    return items.map(c=>({
      t: new Date(c.time || c['open-time'] || c.datetime || c.t),
      o: parseFloat(c.open||c.o),
      h: parseFloat(c.high||c.h),
      l: parseFloat(c.low||c.l),
      c: parseFloat(c.close||c.c),
      v: parseInt(c.volume||c.v||0)
    })).filter(c=>c.c&&!isNaN(c.c));
  } catch(e){ console.error('Candle error',sym,e); return null; }
}

// ── INDICATORS ─────────────────────────────────────────────────────────────
function calcRSI(closes, period=14) {
  if(closes.length<period+1) return null;
  let gains=0,losses=0;
  for(let i=closes.length-period;i<closes.length;i++){
    const d=closes[i]-closes[i-1];
    if(d>0)gains+=d;else losses-=d;
  }
  const ag=gains/period,al=losses/period;
  if(al===0)return 100;
  return 100-(100/(1+ag/al));
}

function calcEMA(closes,period) {
  if(closes.length<period) return null;
  const k=2/(period+1);
  let ema=closes.slice(0,period).reduce((a,b)=>a+b,0)/period;
  for(let i=period;i<closes.length;i++) ema=closes[i]*k+ema*(1-k);
  return ema;
}

function calcMACD(closes) {
  const e12=calcEMA(closes,12),e26=calcEMA(closes,26);
  if(!e12||!e26) return null;
  return {macd:e12-e26};
}

function calcVWAP(candles) {
  if(!candles||candles.length===0) return null;
  const today=new Date();
  const td=candles.filter(c=>{
    const d=new Date(c.t);
    return d.getDate()===today.getDate()&&d.getMonth()===today.getMonth();
  });
  if(td.length===0) return candles.slice(-20).reduce((acc,c)=>{
    const tp=(c.h+c.l+c.c)/3;
    acc.tpv+=tp*(c.v||1);acc.vol+=(c.v||1);return acc;
  },{tpv:0,vol:0});
  const r=td.reduce((acc,c)=>{const tp=(c.h+c.l+c.c)/3;acc.tpv+=tp*(c.v||1);acc.vol+=(c.v||1);return acc;},{tpv:0,vol:0});
  return r.vol>0?r.tpv/r.vol:null;
}

// ── SIGNALS ─────────────────────────────────────────────────────────────────
function generateSignals(sym,closes,candles,rsi,macd,vwap,price) {
  const now=new Date();
  const timeStr=now.toLocaleTimeString('en-US',{hour:'2-digit',minute:'2-digit',timeZone:'America/New_York'});
  const p=parseFloat(price);
  const newSigs=[];

  if(rsi!==null){
    if(rsi<32) newSigs.push({ticker:sym,type:'RSI OVERSOLD',desc:`RSI ${rsi.toFixed(1)} — oversold territory. Watch for bullish candle confirmation at support.`,dir:'bull',strength:Math.min(3,Math.floor((35-rsi)/3)+1),time:timeStr});
    else if(rsi>68) newSigs.push({ticker:sym,type:'RSI OVERBOUGHT',desc:`RSI ${rsi.toFixed(1)} — overbought. Move may be exhausted. Watch for bearish reversal.`,dir:'bear',strength:Math.min(3,Math.floor((rsi-65)/3)+1),time:timeStr});
  }

  if(macd!==null){
    if(macd.macd>0&&macd.macd<0.8) newSigs.push({ticker:sym,type:'MACD BULLISH',desc:`MACD above signal line. Momentum shifting upward — bias calls.`,dir:'bull',strength:2,time:timeStr});
    else if(macd.macd<0&&macd.macd>-0.8) newSigs.push({ticker:sym,type:'MACD BEARISH',desc:`MACD below signal line. Momentum shifting downward — bias puts.`,dir:'bear',strength:2,time:timeStr});
  }

  if(vwap&&p){
    const diff=((p-vwap)/vwap)*100;
    if(Math.abs(diff)<0.08) newSigs.push({ticker:sym,type:'TESTING VWAP',desc:`Price at VWAP $${parseFloat(vwap).toFixed(2)}. Reclaim = bullish, rejection = bearish. Key moment.`,dir:'neutral',strength:2,time:timeStr});
  }

  if(candles&&candles.length>5){
    const recent=candles.slice(-5);
    const avgVol=recent.slice(0,-1).reduce((a,c)=>a+(c.v||0),0)/4;
    const lastVol=recent[recent.length-1].v||0;
    if(lastVol>avgVol*2.5&&avgVol>0){
      const lastC=candles[candles.length-1];
      newSigs.push({ticker:sym,type:'VOLUME SPIKE',desc:`Volume ${(lastVol/avgVol).toFixed(1)}x above average. Strong participation — confirms direction.`,dir:lastC.c>lastC.o?'bull':'bear',strength:3,time:timeStr});
    }
  }

  return newSigs;
}

// ── RENDER TICKER LIST ──────────────────────────────────────────────────────
function renderTickerList() {
  const container=document.getElementById('ticker-list');
  let html='';
  const sections=[
    {label:'INDEXES',tickers:TICKERS.indexes},
    {label:'HIGH OPTIONS ACTIVITY',tickers:TICKERS.active_options}
  ];
  for(const section of sections){
    html+=`<div class="section-label">${section.label}</div>`;
    for(const t of section.tickers){
      const q=quoteData[t.sym];
      const price=q?.price??'---';
      const chgNum=parseFloat(q?.changePct??0);
      const dir=chgNum>0?'up':chgNum<0?'down':'neutral';
      const arrow=chgNum>0?'▲':chgNum<0?'▼':'—';
      const sig=q?._signal??'neutral';
      const sigLabel=sig==='bull'?'BULLISH':sig==='bear'?'BEARISH':'NEUTRAL';
      const sigClass=sig==='bull'?'sig-bull':sig==='bear'?'sig-bear':'sig-neutral';
      const activeClass=t.sym===activeTicker?'active':'';
      html+=`
        <div class="ticker-item ${activeClass}" onclick="selectTicker('${t.sym}')">
          <div class="ticker-left">
            <div class="ticker-sym">${t.sym}</div>
            <div class="ticker-name">${t.name}</div>
            <div class="signal-badge ${sigClass}">${sigLabel}</div>
          </div>
          <div class="ticker-right">
            <div class="ticker-price ${dir}">$${price}</div>
            <div class="ticker-change ${dir}">${arrow} ${Math.abs(chgNum).toFixed(2)}%</div>
          </div>
        </div>`;
    }
    html+='<div class="divider"></div>';
  }
  container.innerHTML=html;
  document.getElementById('ticker-count').textContent=ALL_TICKERS.length;
}

// ── RENDER CHART ────────────────────────────────────────────────────────────
function renderChart(candles) {
  if(!candles||candles.length===0) return;
  const ctx=document.getElementById('mainChart').getContext('2d');
  const labels=candles.map(c=>{
    const d=new Date(c.t);
    return activeTF==='D'
      ? d.toLocaleDateString('en-US',{month:'short',day:'numeric'})
      : d.toLocaleTimeString('en-US',{hour:'2-digit',minute:'2-digit',timeZone:'America/New_York'});
  });
  const closes=candles.map(c=>c.c);
  const volumes=candles.map(c=>c.v||0);
  const colors=candles.map((c,i)=>i===0?'rgba(0,207,255,0.7)':c.c>=c.o?'rgba(0,255,136,0.7)':'rgba(255,59,92,0.7)');

  const k9=2/10,k20=2/21;
  let e9=closes[0],e20=closes[0];
  const ema9=[],ema20=[];
  for(let i=0;i<closes.length;i++){
    e9=closes[i]*k9+e9*(1-k9);
    e20=closes[i]*k20+e20*(1-k20);
    ema9.push(parseFloat(e9.toFixed(2)));
    ema20.push(parseFloat(e20.toFixed(2)));
  }

  const vwap=calcVWAP(candles);
  const vwapLine=vwap&&!isNaN(vwap)?candles.map(()=>parseFloat(parseFloat(vwap).toFixed(2))):[];

  if(chartInstance) chartInstance.destroy();
  chartInstance=new Chart(ctx,{
    type:'bar',
    data:{
      labels,
      datasets:[
        {type:'line',label:'Price',data:closes,borderColor:'#e8e8e8',borderWidth:1.5,pointRadius:0,tension:0.1,yAxisID:'y',order:1},
        {type:'line',label:'EMA9',data:ema9,borderColor:'#ffd93d',borderWidth:1,pointRadius:0,tension:0.3,yAxisID:'y',order:2},
        {type:'line',label:'EMA20',data:ema20,borderColor:'#00cfff',borderWidth:1,pointRadius:0,tension:0.3,yAxisID:'y',order:3},
        ...(vwapLine.length?[{type:'line',label:'VWAP',data:vwapLine,borderColor:'#ff3b5c',borderWidth:1,borderDash:[4,4],pointRadius:0,yAxisID:'y',order:4}]:[]),
        {type:'bar',label:'Vol',data:volumes,backgroundColor:colors,yAxisID:'y2',order:5}
      ]
    },
    options:{
      responsive:true,maintainAspectRatio:false,
      interaction:{mode:'index',intersect:false},
      plugins:{
        legend:{display:true,labels:{color:'#444',font:{family:'Space Mono',size:9},boxWidth:10,padding:8}},
        tooltip:{backgroundColor:'#0f0f0f',borderColor:'#1f1f1f',borderWidth:1,titleColor:'#888',bodyColor:'#e8e8e8',titleFont:{family:'Space Mono',size:9},bodyFont:{family:'Space Mono',size:10}}
      },
      scales:{
        x:{ticks:{color:'#333',font:{family:'Space Mono',size:8},maxTicksLimit:10},grid:{color:'#111'}},
        y:{position:'right',ticks:{color:'#555',font:{family:'Space Mono',size:9}},grid:{color:'#111'}},
        y2:{position:'left',ticks:{display:false},grid:{display:false},max:Math.max(...volumes)*5}
      }
    }
  });
}

// ── UPDATE INDICATORS ───────────────────────────────────────────────────────
function updateIndicators(candles,price) {
  if(!candles||candles.length===0) return {};
  const closes=candles.map(c=>c.c).filter(Boolean);
  const p=parseFloat(price);

  const rsi=calcRSI(closes);
  if(rsi!==null){
    const el=document.getElementById('rsi-val');
    el.textContent=rsi.toFixed(1);
    el.className=`ind-value ${rsi>70?'down':rsi<30?'up':'neutral'}`;
    document.getElementById('rsi-bar').style.cssText=`width:${rsi}%;background:${rsi>70?'var(--red)':rsi<30?'var(--green)':'var(--blue)'}`;
    const sig=rsi>70?'OVERBOUGHT — watch for reversal':rsi<30?'OVERSOLD — bounce possible':rsi>55?'Bullish momentum':rsi<45?'Bearish momentum':'Neutral zone';
    document.getElementById('rsi-signal').textContent=sig;
    document.getElementById('rsi-signal').style.color=rsi>70?'var(--red)':rsi<30?'var(--green)':'var(--mid)';
  }

  const macd=calcMACD(closes);
  if(macd!==null){
    const el=document.getElementById('macd-val');
    el.textContent=macd.macd.toFixed(3);
    el.className=`ind-value ${macd.macd>0?'up':'down'}`;
    const pct=Math.min(100,Math.max(0,50+macd.macd*10));
    document.getElementById('macd-bar').style.cssText=`width:${pct}%;background:${macd.macd>0?'var(--green)':'var(--red)'}`;
    document.getElementById('macd-signal').textContent=macd.macd>0?'Bullish — above signal line':'Bearish — below signal line';
    document.getElementById('macd-signal').style.color=macd.macd>0?'var(--green)':'var(--red)';
  }

  const vwap=calcVWAP(candles);
  if(vwap!==null&&p){
    const above=p>vwap;
    const el=document.getElementById('vwap-val');
    el.textContent=`$${parseFloat(vwap).toFixed(2)}`;
    el.className=`ind-value ${above?'up':'down'}`;
    document.getElementById('vwap-bar').style.cssText=`width:${above?75:25}%;background:${above?'var(--green)':'var(--red)'}`;
    document.getElementById('vwap-signal').textContent=above?'ABOVE VWAP — bullish bias':'BELOW VWAP — bearish bias';
    document.getElementById('vwap-signal').style.color=above?'var(--green)':'var(--red)';
  }

  return {rsi,macd,vwap};
}

// ── RENDER SIGNALS ──────────────────────────────────────────────────────────
function renderSignals() {
  const feed=document.getElementById('signal-feed');
  document.getElementById('signal-count').textContent=signals.length;
  if(signals.length===0){
    feed.innerHTML=`<div style="padding:20px 14px;color:var(--muted);font-family:'Space Mono',monospace;font-size:10px;">No signals detected yet. Watching market...</div>`;
    return;
  }
  feed.innerHTML=signals.slice().reverse().slice(0,30).map(s=>{
    const dots=[1,2,3].map(i=>`<div class="strength-dot ${i<=s.strength?(s.dir==='bull'?'filled-bull':s.dir==='bear'?'filled-bear':''):''}"></div>`).join('');
    const color=s.dir==='bull'?'var(--green)':s.dir==='bear'?'var(--red)':'var(--mid)';
    return `<div class="signal-item">
      <div class="signal-top"><div class="signal-ticker" style="color:${color}">${s.ticker}</div><div class="signal-time">${s.time}</div></div>
      <div class="signal-type" style="color:${color}">${s.type}</div>
      <div class="signal-desc">${s.desc}</div>
      <div class="signal-strength">${dots}</div>
    </div>`;
  }).join('');
}

const candleCache = {};

async function selectTicker(sym) {
  activeTicker=sym;
  renderTickerList();
  const q=quoteData[sym];
  document.getElementById('active-sym').textContent=sym;
  if(q){
    const chgNum=parseFloat(q.changePct);
    document.getElementById('active-price').textContent=`$${q.price}`;
    document.getElementById('active-price').className=`chart-price-display ${chgNum>=0?'up':'down'}`;
    document.getElementById('active-change').textContent=`${chgNum>=0?'▲':'▼'} ${Math.abs(chgNum).toFixed(2)}%`;
    document.getElementById('active-change').className=`chart-change-display ${chgNum>=0?'up':'down'}`;
    document.getElementById('stat-high').textContent=q.high?`$${q.high}`:'--';
    document.getElementById('stat-low').textContent=q.low?`$${q.low}`:'--';
    document.getElementById('stat-vol').textContent=q.volume?formatVol(q.volume):'--';
    document.getElementById('stat-avgvol').textContent='--';
  }

  // Use cache if available — avoids repeat API calls
  let candles = candleCache[sym];
  if(!candles) {
    candles = await fetchCandles(sym,'D','1y');
    if(!candles||candles.length===0) candles = await fetchCandles(sym,'W','5y');
    if(candles&&candles.length>0) candleCache[sym] = candles;
  }

  if(candles&&candles.length>0){
    renderChart(candles);
    const inds=updateIndicators(candles,q?.price);
    const newSigs=generateSignals(sym,candles.map(c=>c.c),candles,inds.rsi,inds.macd,inds.vwap,q?.price);
    // Only add signals if not already present for this ticker
    const existing=signals.map(s=>s.ticker);
    if(!existing.includes(sym)) signals.push(...newSigs);
    renderSignals();
    if(candles[candles.length-1].v){
      document.getElementById('stat-vol').textContent=formatVol(candles[candles.length-1].v);
    }
  } else {
    const ctx=document.getElementById('mainChart').getContext('2d');
    if(chartInstance) chartInstance.destroy();
    ctx.clearRect(0,0,ctx.canvas.width,ctx.canvas.height);
    ctx.fillStyle='#444';
    ctx.font='11px monospace';
    ctx.fillText('Rate limit hit — wait 60 seconds and click again',40,180);
  }
}

function setTF(res,range,btn) {
  activeTF=res;activeFrom=range;
  document.querySelectorAll('.tf-btn').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  selectTicker(activeTicker);
}

function formatVol(v) {
  if(v>=1e9)return(v/1e9).toFixed(1)+'B';
  if(v>=1e6)return(v/1e6).toFixed(1)+'M';
  if(v>=1e3)return(v/1e3).toFixed(0)+'K';
  return v;
}

// ── REFRESH ALL ─────────────────────────────────────────────────────────────
async function refreshAll() {
  const btn=document.getElementById('refresh-btn');
  btn.textContent='↺ LOADING';btn.classList.add('loading');
  signals=[];

  // Connect DXLink for live streaming quotes
  const syms = ALL_TICKERS.map(t=>t.sym);
  if(!dxSocket || dxSocket.readyState !== WebSocket.OPEN) {
    await connectDXLink(syms).catch(e => console.error('DXLink connect failed:', e));
  }
  // Also fetch market metrics for initial price display
  for(const t of ALL_TICKERS) {
    const q = await fetchQuote(t.sym);
    if(q) quoteData[t.sym] = {...q, _signal:'neutral'};
    await new Promise(r=>setTimeout(r,100));
  }

  // Only fetch quotes in bulk — candles load on demand when ticker is clicked
  renderTickerList();
  renderSignals();
  await selectTicker(activeTicker);
  btn.textContent='↺ REFRESH';btn.classList.remove('loading');
}

// ── INIT ─────────────────────────────────────────────────────────────────────
let isRefreshing = false;
const _refreshAll = refreshAll;
refreshAll = async function() {
  if(isRefreshing) return;
  isRefreshing = true;
  await _refreshAll();
  isRefreshing = false;
}
renderTickerList();
refreshAll();
setInterval(refreshAll, 300000); // auto-refresh every 5 min only
</script>
